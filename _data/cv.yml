    Projects:
      - name: Robot Sim-to-Real Suite
        summary: Lightweight sim-to-real evaluation framework using SAPIEN for policy rollout across simulation and real robot hardware. Includes teleoperation pipeline for humanoid demonstration collection (used for fine-tuning GR00T foundation models) and a Diffusion Policy inference web service integrated with ROS for real-time dexterous-hand execution.
        url: https://github.com/heyjiacheng/test_any_policy
        start_date: 2025-10
        end_date: 2026-05
        highlights:
          - Role: Research Engineer.
          - Tech: SAPIEN, PyTorch, ROS, FastAPI.

      - name: Gaussian Splatting for Language-Driven Manipulation (Master's Thesis)
        summary: Built semantic-aware 3D Gaussian Splatting by distilling 2D vision-language features into per-Gaussian features. Structured LLM outputs into executable optimization objectives for downstream robot planning, enabling instruction-conditioned 3D scene editing and post-state reconstruction (e.g., relocating objects to satisfy task constraints).
        url: https://github.com/heyjiacheng/Forecast-GS
        start_date: 2024-10
        end_date: 2025-09
        highlights:
          - Role: Master's Thesis.
          - Tech: 3D Gaussian Splatting, LLMs, PyTorch.

      - name: Multibody Dynamics Simulator
        summary: From-scratch physics engine in pure Rust simulating 6-DOF rigid chains under gravity. Implemented Lie-algebra-based spatial vector calculus with CRBA (Composite Rigid Body Algorithm) and RNE (Recursive Newton-Euler) for force/torque solving, an RK4 numerical integrator for stability, and real-time 3D visualization.
        url: https://github.com/heyjiacheng/mujoco_hinge_chain
        start_date: 2025-10
        end_date: 2025-11
        highlights:
          - Role: Personal Project.
          - Tech: Rust, Lie algebra, CRBA, RNE, RK4.

